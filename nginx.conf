worker_processes 1;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    upstream app {
        server 127.0.0.1:35000;
        keepalive 16;
    }

    server {
        __LISTEN_DIRECTIVES__
        server_name _;

        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https://cloudflare-dns.com https://doh.sb; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 5s;
        send_timeout 3600s;

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }

        location /socket.io {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_redirect off;
            proxy_pass http://app/socket.io;
        }

        location = /favicon.ico {
            proxy_pass http://app/assets/favicon.ico;
        }

        access_log /dev/stdout;
        error_log /dev/stderr;
    }
}
